services:
  cherryapi:
    build:
      context: .
      args:
        VITE_ADMIN_TOKEN: ${ADMIN_TOKEN:-change-me}
        VITE_API_TARGET: ""
    image: cherryapi:0.1.0
    container_name: cherryapi
    ports:
      - "${CHERRYAPI_PORT:-3000}:3000"
      - "${CHERRYAPI_CODEX_CALLBACK_PORT:-1455}:1455"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: file:/app/data/cherryapi.sqlite
      WEB_DIST_DIR: /app/apps/web/dist
      ADMIN_TOKEN: ${ADMIN_TOKEN:-change-me}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-change-me-32-bytes-minimum}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CODEX_CALLBACK_HOST: 0.0.0.0
    volumes:
      - ./data:/app/data
    restart: unless-stopped
